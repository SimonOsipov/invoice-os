name: PR Preview Backend (deploy fleet + health-gate)

# Backend half of the M1-08 deploy model (M2-12): on a non-draft app-code PR (the
# trigger paths mirror preview.yml so the whole dev env comes up together), deploy
# the eight backend services to the shared dev environment from the PR's code — the
# gateway FIRST and health-gated, then the seven context services in parallel. The
# gateway runs `goose up` at boot (docs/migrations.md
# §2), so health-gating it is the schema-before-fleet barrier: the context
# services deploy only once the gateway is healthy, i.e. the schema is fully
# migrated. Mirrors preview.yml (the SPA half); NOT a required check.
#
# Auth: RAILWAY_API_DEV_TOKEN is a Railway PROJECT token scoped to the dev
# environment, consumed as RAILWAY_TOKEN — so `railway up --service <svc>`
# targets the FiscalBridge dev env with no `railway link` and no IDs.
#
# NOTE: this workflow is only meaningful once M2-12 has provisioned the eight
# services (add-a-service.md §5). Before that, `railway up --service <svc>` has no
# service to target and the run fails — expected, and harmless because this is not
# a required check.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    # Any app-code PR (frontend OR backend) previews the WHOLE dev env so the SPAs
    # and the backend fleet come up together (see preview.yml). This list is the
    # UNION of the backend + frontend paths and MUST stay in sync with preview.yml's.
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'migrations/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Dockerfile.dockerignore'
      - 'frontend/**'
      - 'packages/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/preview.yml'
      - '.github/workflows/preview-backend.yml'
  workflow_dispatch:

# Share preview.yml's lock: only one PR deploys to the single shared dev
# environment at a time (a second PR queues rather than racing; a teardown never
# races a deploy).
concurrency:
  group: dev-preview-shared
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # 1. Deploy the gateway. `railway up --ci` streams build logs and exits when the
  #    BUILD completes — it does NOT wait for the deployment to be healthy; the
  #    health-gate job below does that.
  gateway:
    name: Deploy gateway → dev
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    steps:
      - uses: actions/checkout@v4
      - name: railway up gateway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: railway up --ci --service gateway
        timeout-minutes: 15

  # 2. The schema-before-fleet barrier. Wait for the gateway's public /healthz to
  #    answer 200. The gateway applies every pending migration at boot BEFORE it
  #    can pass its healthcheck (it log.Fatals on a migration error), so a green
  #    /healthz proves the schema is fully migrated — this is what the context
  #    services wait behind, and what catches a failed migration (railway up
  #    already returned after a successful build).
  health-gate:
    name: Gate on gateway /healthz (schema migrated)
    needs: gateway
    if: needs.gateway.result == 'success'
    runs-on: ubuntu-latest
    env:
      # The gateway's public Railway domain (dev), generated in M2-12 Half B
      # (add-a-service.md §5 step 6). Same pattern as preview.yml's hardcoded SPA URLs.
      GATEWAY_URL: https://gateway-development-997b.up.railway.app
    steps:
      - name: Wait for gateway /healthz 200
        run: |
          echo "Waiting for $GATEWAY_URL/healthz ..."
          ok=0
          for _ in $(seq 1 40); do
            code=$(curl -fsS -o /dev/null -w '%{http_code}' "$GATEWAY_URL/healthz" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then echo "  gateway healthy (schema migrated)"; ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::$GATEWAY_URL/healthz did not return 200 within 200s (migration failed, or GATEWAY_URL not set — see M2-12 Half B)"
            exit 1
          fi

  # 3. Deploy the seven context services, only after the gateway is healthy. They
  #    boot against the already-migrated schema and never run migrations.
  services:
    name: Deploy ${{ matrix.service }} → dev
    needs: health-gate
    if: needs.health-gate.result == 'success'
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [tenancy, portfolio, invoice, validation, submission, dashboard, notifications]
    steps:
      - uses: actions/checkout@v4
      - name: railway up ${{ matrix.service }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: railway up --ci --service ${{ matrix.service }}
        timeout-minutes: 15
