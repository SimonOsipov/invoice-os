name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the monorepo changed so SPA-only PRs skip Go and
  # Go-only PRs skip the frontend. A change to this workflow triggers both.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'cmd/**'
              - 'internal/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - 'Dockerfile.dockerignore'
              - '.github/workflows/ci.yml'
            migrations:
              - 'migrations/**'
              - 'db/**'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  go:
    name: Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    # No Postgres here on purpose: every DB-backed suite (RLS, queue) is env-gated and
    # SKIPS without its per-role DATABASE_* URLs, so each runs in its own bootstrap+migrate
    # job below (`rls`, `queue`) — never here. A DATABASE_URL in this job would point the
    # queue smoke suite at an unmigrated DB, so it is deliberately absent. This job
    # builds/vets/tests the pure-Go units.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No dependencies / go.sum yet — nothing to cache. Enable in M2.
          cache: false
      - name: Build
        run: go build ./...
      # vet/test error on an empty module ("no packages"), so gate them on
      # there being at least one package. They run automatically from M2 on.
      - name: Vet
        run: |
          if [ -n "$(go list ./...)" ]; then
            go vet ./...
          else
            echo "No Go packages yet — skipping vet (wired for M2)."
          fi
      - name: Test
        run: |
          if [ -n "$(go list ./...)" ]; then
            go test ./...
          else
            echo "No Go packages yet — skipping test (wired for M2)."
          fi

  # Prove the shared multi-service Dockerfile (M2-04) actually builds before it
  # reaches Railway (M2-12). Building one service is enough — all seven stamp the
  # same root Dockerfile with only the SERVICE build arg differing. This also
  # guards "Option B": the build only sees Go source because Dockerfile.dockerignore
  # overrides the SPA-tuned root .dockerignore, so a regression in either fails
  # here (BuildKit via buildx) instead of at deploy time. No image is pushed.
  docker-canary:
    name: Docker image (canary)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build one service image (SERVICE=tenancy)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            SERVICE=tenancy
          push: false

  # The independent migration gate (M2-01, task-9.2): prove the goose harness end to
  # end against a FRESH, ephemeral Postgres — zero Railway dependency. Bootstrap the
  # two non-superuser roles as the superuser, apply every migration as the migrator,
  # assert nothing is left pending, then a reset→up round-trip to prove every
  # migration is reversible. The DB is empty each run (no reliance on prior state).
  # Modeled on learn-greek-easy's gating alembic-check; see docs/migrations.md §6.
  migrations:
    name: Migrations (fresh Postgres)
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    # Postgres MAJOR must match the Railway-provisioned major (both 18 today —
    # Railway's postgres-ssl template provisioned PG18) — bump together. See
    # docs/migrations.md §6 and add-a-service.md.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # bootstrap runs as the superuser; goose runs as the migrator. The app role
      # (DATABASE_URL) is deliberately never used here. Dev-safe passwords only —
      # this is an ephemeral throwaway DB.
      DATABASE_SUPERUSER_URL: postgres://postgres:postgres@localhost:5432/invoice_os?sslmode=disable
      DATABASE_MIGRATION_URL: postgres://invoice_migrator:migrator@localhost:5432/invoice_os?sslmode=disable
      MIGRATOR_PASSWORD: migrator
      APP_PASSWORD: app
      READER_PASSWORD: reader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Bootstrap non-superuser roles (as superuser; psql is preinstalled on the runner)
        run: make db-bootstrap
      - name: Apply all migrations from empty (as migrator)
        run: make migrate-up
      - name: Assert nothing pending after up
        # goose prints status to stderr — capture with 2>&1 or the grep never matches.
        run: |
          if make migrate-status 2>&1 | grep -qi 'pending'; then
            echo "::error::migrations still pending after 'up'"
            make migrate-status 2>&1 || true
            exit 1
          fi
          echo "No pending migrations after up."
      - name: Reversibility round-trip (reset all down -> up)
        # `reset` runs every Down; a broken/irreversible down exits non-zero here.
        run: |
          make migrate-reset
          make migrate-up
          if make migrate-status 2>&1 | grep -qi 'pending'; then
            echo "::error::migrations pending after reset->up round-trip"
            exit 1
          fi
          echo "Reset -> up round-trip clean; every migration is reversible."
      - name: Embedded-migration apply (the gateway's on-deploy path)
        # Prove the migrations embedded into the gateway binary (go:embed +
        # internal/platform/db.MigrateUp) apply from empty and leave nothing
        # pending — the exact code path the gateway runs at boot (M2-12,
        # docs/migrations.md §2). The filesystem round-trip above can't catch a
        # stale/incomplete go:embed; this can. DATABASE_MIGRATION_URL is already in
        # this job's env, so the test runs here (it self-skips everywhere else).
        run: go test -count=1 -run TestMigrateUpFromEmbedded ./internal/platform/db/...

  # The M2-07 adversarial RLS suite. Proves the M2-06 tenant-isolation mechanism
  # (FORCE RLS + WithinTenantTx) holds by attacking it as each role against a real
  # Postgres: cross-tenant SELECT/INSERT/UPDATE refused, a missing tenant context
  # fails closed, the table owner cannot bypass a FORCE'd table, and a reused pooled
  # connection cannot carry tenant context across transactions. It bootstraps roles
  # and migrates exactly like the `migrations` job, then runs the suite as the
  # app/migrator/reader roles. The suite SKIPS itself when these DATABASE_* URLs are
  # absent, so the `go` job above and a bare local `go test ./...` stay green without
  # a database. See docs/migrations.md §6, §8. (The build plan floated testcontainers;
  # we reuse this service-container + Makefile-bootstrap path instead — no new Go
  # dependency, one canonical bootstrap, CI-consistent.)
  rls:
    name: RLS isolation (adversarial)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # bootstrap runs as the superuser; goose runs as the migrator; the suite then
      # connects as all four identities. Dev-safe passwords only (ephemeral throwaway
      # DB). NEVER point the app/migrator/reader URLs at the superuser — BYPASSRLS
      # would make every isolation policy a silent no-op.
      DATABASE_SUPERUSER_URL: postgres://postgres:postgres@localhost:5432/invoice_os?sslmode=disable
      DATABASE_MIGRATION_URL: postgres://invoice_migrator:migrator@localhost:5432/invoice_os?sslmode=disable
      DATABASE_URL: postgres://invoice_app:app@localhost:5432/invoice_os?sslmode=disable
      DATABASE_READER_URL: postgres://invoice_tenant_reader:reader@localhost:5432/invoice_os?sslmode=disable
      MIGRATOR_PASSWORD: migrator
      APP_PASSWORD: app
      READER_PASSWORD: reader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Bootstrap non-superuser roles (as superuser; psql is preinstalled on the runner)
        run: make db-bootstrap
      - name: Apply all migrations (as migrator)
        run: make migrate-up
      - name: Run the adversarial RLS suite (as app / migrator / reader)
        # -count=1 disables the test cache: the suite MUST re-run against this fresh DB.
        run: go test -count=1 -run TestRLS ./internal/platform/db/...
      - name: Tenancy /v1/me suite (RLS-scoped read as invoice_app)
        # M2-13/M3-02-01: proves Store.Me's bare SELECTs resolve to exactly the
        # caller's tenant + domain role under RLS. Needs DATABASE_URL (app) +
        # DATABASE_SUPERUSER_URL (seed) — both already in this job's env; it
        # self-skips everywhere else.
        run: go test -count=1 ./internal/tenancy/...
      - name: Portfolio /v1/entities suite (RLS-scoped CRUD + audit as invoice_app)
        # M3-03: proves the portfolio store's CRUD/lifecycle methods resolve to exactly
        # the caller's tenant under RLS and write audit rows in the same tx. Needs
        # DATABASE_URL (app) + DATABASE_SUPERUSER_URL (seed) — both already in this job's env.
        run: go test -count=1 ./internal/portfolio/...
      - name: Validation /v1 suite (engine + store + handlers as invoice_app)
        # M3-04: proves the rules-as-data engine, the DB-backed Store (LoadActiveRuleSet
        # + ToggleRule audit) and the HTTP handlers over the migrated rules tables. Needs
        # DATABASE_URL (app) + DATABASE_SUPERUSER_URL (seed) — both already in this job's env.
        run: go test -count=1 ./internal/validation/...

  # The M2-08 smoke + M2-09 exactly-once queue suites. Prove the async job spine end to end
  # against a real Postgres AS invoice_app (non-superuser, NOBYPASSRLS): the transactional-
  # outbox enqueue commits a job + its idempotency key atomically (a rollback leaves
  # neither), a duplicate business key yields exactly one job, and — adversarially (M2-09) —
  # the exactly-once composite holds under rollback, concurrent workers (SKIP LOCKED),
  # committed-then-crashed retries (the OncePerJob guard), poison/DLQ discard, and operator
  # re-drive. It bootstraps roles and migrates exactly like the `migrations`/`rls` jobs
  # (creating River's tables + idempotency_keys), then runs the whole ./internal/submission
  # package as invoice_app; the M2-09 suite also needs DATABASE_MIGRATION_URL (already set
  # below) to create its runtime effects table as the migrator. Both suites SKIP themselves
  # without their DATABASE_* URLs, so the `go` job and a bare `go test ./...` stay green.
  queue:
    name: Queue suites (River outbox + exactly-once)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # bootstrap runs as the superuser; goose runs as the migrator; the smoke suite then
      # connects as invoice_app (never the superuser — BYPASSRLS would void the guarantees).
      DATABASE_SUPERUSER_URL: postgres://postgres:postgres@localhost:5432/invoice_os?sslmode=disable
      DATABASE_MIGRATION_URL: postgres://invoice_migrator:migrator@localhost:5432/invoice_os?sslmode=disable
      DATABASE_URL: postgres://invoice_app:app@localhost:5432/invoice_os?sslmode=disable
      MIGRATOR_PASSWORD: migrator
      APP_PASSWORD: app
      READER_PASSWORD: reader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Bootstrap non-superuser roles (as superuser; psql is preinstalled on the runner)
        run: make db-bootstrap
      - name: Apply all migrations (as migrator)
        run: make migrate-up
      - name: Run the queue smoke + exactly-once suites (as invoice_app)
        # -count=1 disables the test cache: the suites MUST re-run against this fresh DB. No
        # -run filter, so new tests in ./internal/submission are picked up automatically;
        # each DB-backed test self-skips without its DATABASE_* URLs.
        run: go test -count=1 ./internal/submission/...

  # M2-10 audit suite: proves audit_log rows are append-only (UPDATE/DELETE/TRUNCATE rejected
  # for the app by the missing grant and for the table owner by the append-only trigger) and
  # commit/roll back atomically with the caller's transaction. Bootstraps roles and migrates
  # exactly like the `migrations`/`rls`/`queue` jobs (creating the committed audit_log table),
  # then runs ./internal/audit as invoice_app; the owner-immutability case also needs
  # DATABASE_MIGRATION_URL (already set below) to attack as invoice_migrator. The suite SKIPS
  # itself without both DATABASE_* URLs, so the `go` job and a bare `go test ./...` stay green.
  audit:
    name: Audit suite (append-only + atomicity)
    needs: changes
    if: needs.changes.outputs.go == 'true' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # bootstrap runs as the superuser; goose runs as the migrator; the suite then connects
      # as invoice_app (writes + grant/RLS attacks) and invoice_migrator (the owner attack).
      DATABASE_SUPERUSER_URL: postgres://postgres:postgres@localhost:5432/invoice_os?sslmode=disable
      DATABASE_MIGRATION_URL: postgres://invoice_migrator:migrator@localhost:5432/invoice_os?sslmode=disable
      DATABASE_URL: postgres://invoice_app:app@localhost:5432/invoice_os?sslmode=disable
      MIGRATOR_PASSWORD: migrator
      APP_PASSWORD: app
      READER_PASSWORD: reader
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Bootstrap non-superuser roles (as superuser; psql is preinstalled on the runner)
        run: make db-bootstrap
      - name: Apply all migrations (as migrator)
        run: make migrate-up
      - name: Run the audit immutability/atomicity suite (as invoice_app / invoice_migrator)
        # -count=1 disables the test cache: the suite MUST re-run against this fresh DB. No
        # -run filter, so new tests in ./internal/audit are picked up automatically; each
        # DB-backed test self-skips without its DATABASE_* URLs.
        run: go test -count=1 ./internal/audit/...

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # action-setup reads the pinned pnpm version from package.json#packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build
      - name: Unit tests (api-client)
        run: pnpm --filter @invoice-os/api-client test
      - name: Unit tests (app)
        run: pnpm --filter @invoice-os/app test

  # Unconditional clean-clone guard (M1-09). The path-filtered go/frontend jobs
  # above only rebuild the half that changed, and the frontend job warms the pnpm
  # store cache — so cross-half rot, a cache-masked lockfile break, an accidentally
  # uncommitted build input (the M1-01 go.mod trap), or a root-file change that
  # matches neither filter can all slip past them. This job always runs, uses no
  # caches, and builds BOTH halves from a fresh checkout — permanently guarding the
  # module-path fix (M1-01) and the workspace collapse (M1-02/03).
  clean-clone:
    name: Clean-clone build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Go from scratch — no module/build cache.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: go build ./... (from scratch)
        run: go build ./...
      # All SPAs from scratch — cold pnpm install (deliberately no `cache: pnpm`)
      # so a stale cache can't mask a lockfile that no longer resolves.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: pnpm install (cold, frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: pnpm -r build (all three SPAs)
        run: pnpm -r build

  # Single always-running gate. Mark THIS check ("CI") required in branch
  # protection (M1-05): it passes when the triggered jobs pass or are skipped,
  # and fails only when a job that actually ran failed — so path-filtered
  # skips never leave a required check stuck pending.
  ci:
    name: CI
    needs: [changes, go, frontend, clean-clone, migrations, docker-canary, rls, queue, audit]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all triggered jobs to pass
        run: |
          echo "changes:       ${{ needs.changes.result }}"
          echo "go:            ${{ needs.go.result }}"
          echo "docker-canary: ${{ needs.docker-canary.result }}"
          echo "migrations:    ${{ needs.migrations.result }}"
          echo "rls:           ${{ needs.rls.result }}"
          echo "queue:         ${{ needs.queue.result }}"
          echo "audit:         ${{ needs.audit.result }}"
          echo "frontend:      ${{ needs.frontend.result }}"
          echo "clean-clone:   ${{ needs.clean-clone.result }}"
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::'changes' job did not succeed"; exit 1
          fi
          if [ "${{ needs.go.result }}" = "failure" ] || [ "${{ needs.go.result }}" = "cancelled" ]; then
            echo "::error::Go job failed"; exit 1
          fi
          if [ "${{ needs.docker-canary.result }}" = "failure" ] || [ "${{ needs.docker-canary.result }}" = "cancelled" ]; then
            echo "::error::Docker canary build failed"; exit 1
          fi
          if [ "${{ needs.migrations.result }}" = "failure" ] || [ "${{ needs.migrations.result }}" = "cancelled" ]; then
            echo "::error::Migrations job failed"; exit 1
          fi
          if [ "${{ needs.rls.result }}" = "failure" ] || [ "${{ needs.rls.result }}" = "cancelled" ]; then
            echo "::error::RLS isolation suite failed"; exit 1
          fi
          if [ "${{ needs.queue.result }}" = "failure" ] || [ "${{ needs.queue.result }}" = "cancelled" ]; then
            echo "::error::Queue smoke suite failed"; exit 1
          fi
          if [ "${{ needs.audit.result }}" = "failure" ] || [ "${{ needs.audit.result }}" = "cancelled" ]; then
            echo "::error::Audit suite failed"; exit 1
          fi
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "::error::Frontend job failed"; exit 1
          fi
          # clean-clone is unconditional (no path filter) — it must actually pass,
          # never merely skip.
          if [ "${{ needs.clean-clone.result }}" != "success" ]; then
            echo "::error::Clean-clone build failed"; exit 1
          fi
          echo "All triggered CI jobs passed (skipped jobs are OK)."
