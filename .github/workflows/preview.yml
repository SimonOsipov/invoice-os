name: PR Preview (deploy + smoke)

# PR-preview half of the learn-greek-easy deploy model (M1-08, task-8.2):
# on a non-draft PR, deploy the three SPAs to the shared dev environment from
# the PR's code, then run the Playwright smoke suite against them.
#
# This workflow is ADDITIVE — it does not change merge behavior. The existing
# per-service auto-deploy-from-main triggers stay in place until task-8.3
# removes them and adds the scale-to-0 teardown. Not a required check.
#
# Auth: RAILWAY_API_DEV_TOKEN is a Railway PROJECT token scoped to the dev
# environment, consumed as RAILWAY_TOKEN — so `railway up --service <svc>`
# targets the FiscalBridge dev env with no `railway link` and no project/
# workspace IDs. (If that secret is actually an account token, switch the env
# key to RAILWAY_API_TOKEN and add a `railway link --project … --environment …`
# step — see task-8.2 notes.)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'frontend/**'
      - 'packages/**'
      - 'e2e/**'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/preview.yml'
  workflow_dispatch:

# One PR deploys to the shared dev environment at a time; a second PR queues
# rather than racing (never cancel an in-flight deploy).
concurrency:
  group: dev-preview-shared
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Deploy each SPA to the dev env from the PR's checked-out source. Skipped for
  # draft PRs. Runs in the Railway CLI container; `railway up --ci` uploads this
  # directory and builds via each service's frontend/<svc>/railway.json.
  deploy:
    name: Deploy ${{ matrix.service }} → dev
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [landing, app, ops-console]
    steps:
      - uses: actions/checkout@v4
      - name: railway up ${{ matrix.service }}
        # --ci streams build logs and exits when the BUILD completes; the smoke
        # job polls /health afterwards to confirm the deployment is live.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: railway up --ci --service ${{ matrix.service }}
        timeout-minutes: 15

  # After all three deploy, wait for each URL to serve /health, then run the
  # Playwright smoke suite (task-8.1) against the dev URLs.
  smoke:
    name: Smoke (Playwright)
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    env:
      LANDING_URL: https://landing-development-92a2.up.railway.app
      APP_URL: https://app-development-3b4b.up.railway.app
      OPS_CONSOLE_URL: https://ops-console-development.up.railway.app
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Wait for dev deployments to be healthy
        run: |
          for url in "$LANDING_URL" "$APP_URL" "$OPS_CONSOLE_URL"; do
            echo "Waiting for $url/health ..."
            ok=0
            for _ in $(seq 1 30); do
              code=$(curl -fsS -o /dev/null -w '%{http_code}' "$url/health" 2>/dev/null || echo 000)
              if [ "$code" = "200" ]; then echo "  healthy"; ok=1; break; fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "::error::$url did not serve /health 200 within 150s"; exit 1
            fi
          done
      - name: Install Chromium
        run: pnpm --filter @invoice-os/e2e exec playwright install --with-deps chromium
      - name: Run smoke suite
        run: pnpm --filter @invoice-os/e2e test
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
