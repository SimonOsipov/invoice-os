name: Dev Env Cleanup (scale full fleet to zero)

# Teardown half of the unified dev-deploy model (M2-14, task-23): dev-env.yml
# deploys the whole fleet on each ready PR and leaves the env UP for as long as
# that PR is open. When the PR is closed (merged or abandoned), this workflow
# tears down all 11 dev services via `railway down`, which REMOVES the latest
# deployment outright (not a scale-to-0 pause). The dev environment and its
# stable URLs are preserved — only the compute is removed.
#
# This teardown mechanism is unchanged, but is now genuinely recoverable
# (M3-16): each service's Watch Paths were cleared out-of-band, so the next
# ready PR's dev-env.yml run always rebuilds every service from scratch via
# `railway up` — including ones the PR itself didn't touch — rather than
# skipping them and leaving a torn-down service Offline. See
# docs/deploy-model.md "Cold-fleet recovery (M3-16)".
#
# For this teardown to actually stick, the per-service auto-deploy-from-main
# triggers must stay removed — otherwise a merge pushes to main and Railway
# re-deploys the service, undoing the scale-to-0. See docs/deploy-model.md.
#
# Same project token as dev-env.yml (RAILWAY_TOKEN ← RAILWAY_API_DEV_TOKEN).

on:
  pull_request:
    types: [closed]

# Share dev-env.yml's lock so a teardown never races a deploy on the single
# shared dev environment.
concurrency:
  group: dev-preview-shared
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scale-down:
    name: Scale ${{ matrix.service }} → 0
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        # The three SPAs plus the eight backend services (gateway + seven
        # context services) — the full fleet dev-env.yml deploys. The dev
        # Postgres (M2-01) is deliberately NOT listed: it is stateful and
        # shared across PRs, so it stays always-on — scaling it to zero on PR
        # close would lose migration state and break every open PR. See
        # docs/migrations.md §7. Do NOT add `postgres` to this matrix.
        service:
          - landing
          - app
          - ops-console
          - gateway
          - tenancy
          - portfolio
          - invoice
          - validation
          - submission
          - dashboard
          - notifications
    steps:
      - name: railway down ${{ matrix.service }}
        # `|| echo` so a service with no active deployment (already scaled down)
        # doesn't fail the job.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: |
          railway down --service ${{ matrix.service }} --yes \
            || echo "no active deployment for ${{ matrix.service }} (already scaled down)"
