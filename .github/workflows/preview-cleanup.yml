name: PR Preview Cleanup (scale dev to zero)

# Teardown half of the learn-greek-easy deploy model (M1-08, task-8.3): when a
# PR is closed or merged, scale the three dev SPA services to zero. The dev
# environment and its stable URLs are preserved — only the compute (latest
# deployment) is removed; `railway up` (preview.yml) brings it back on the next
# PR.
#
# For this teardown to actually stick, the per-service auto-deploy-from-main
# triggers must be removed — otherwise a merge pushes to main and Railway
# re-deploys the service, undoing the scale-to-0. That one-time removal is the
# other half of this cutover; see docs/deploy-model.md.
#
# Same project token as preview.yml (RAILWAY_TOKEN ← RAILWAY_API_DEV_TOKEN).

on:
  pull_request:
    types: [closed]

# Share preview.yml's lock so a teardown never races a deploy on the single
# shared dev environment.
concurrency:
  group: dev-preview-shared
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scale-down:
    name: Scale ${{ matrix.service }} → 0
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        # The three SPAs (M1-08) plus the eight backend services (M2-12: gateway +
        # seven context services). The dev Postgres (M2-01) is deliberately NOT
        # listed: it is stateful and shared across PRs, so it stays always-on —
        # scaling it to zero on PR close would lose migration state and break every
        # open PR. See docs/migrations.md §7. Do NOT add `postgres` to this matrix.
        service:
          - landing
          - app
          - ops-console
          - gateway
          - tenancy
          - portfolio
          - invoice
          - validation
          - submission
          - dashboard
          - notifications
    steps:
      - name: railway down ${{ matrix.service }}
        # `|| echo` so a service with no active deployment (already scaled down)
        # doesn't fail the job.
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: |
          railway down --service ${{ matrix.service }} --yes \
            || echo "no active deployment for ${{ matrix.service }} (already scaled down)"
