name: Dev Env (deploy full fleet + verify)

# Deploy the whole fleet to one Railway environment, then verify it.
# A ready PR → its own ephemeral env (Railway PR Environments, forked from
# `development`). workflow_dispatch → `development` itself, plus reset-seed.
#
# Auth: PR runs use RAILWAY_API_TOKEN (account-scoped); workflow_dispatch uses
# RAILWAY_API_DEV_TOKEN (project token, `Project-Access-Token` header). An
# account token would cover both — collapsing them is an open cleanup.
# Account tokens carry no implicit scope, so every call names --project /
# --environment explicitly.
#
# Human-applied prerequisites (see docs/topology-e2e.md):
#  - Railway PR Environments are OFF and MUST STAY OFF (M4-23-02) — do NOT turn
#    them on. They never worked here (Railway is not subscribed to this repo's PR
#    events), and railway-invariants.yml now fails every PR if they are re-enabled
#    or if any deployment trigger appears. See docs/deploy-model.md.
#  - RAILWAY_API_TOKEN from Account Settings → Tokens, NOT Project Settings:
#    a project token is pinned to one env and cannot reach a PR env.
#  - Railway Watch Paths empty on all 11 non-Postgres services, or `railway up`
#    silently skips untouched services and a torn-down fleet never recovers.
#    resolve-env asserts this at runtime. Re-clear if a service is recreated.
#  - RAILWAY_* IDs in `env:` below are stable; update them if a resource is
#    ever deleted and recreated. Domain suffixes are opaque — always discovered,
#    never hardcoded.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'frontend/**'
      - 'packages/**'
      - 'e2e/**'
      - 'cmd/**'
      - 'internal/**'
      - 'migrations/**'
      - 'db/**'
      - 'tools/prenv/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Dockerfile.dockerignore'
      - 'Caddyfile'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/dev-env.yml'
  workflow_dispatch:

# M4-21-09: each PR now deploys to its OWN ephemeral Railway environment, so
# two different PRs must run FULLY IN PARALLEL rather than queueing behind
# each other — the whole point of per-PR environments (Core AC 4/5). The
# group is keyed by PR number, so it is UNIQUE per PR: two different PRs'
# numbers never collide (their groups differ → both run at once), and a
# second push to the SAME PR queues behind (never cancels) an in-flight
# deploy of that SAME PR. A workflow_dispatch run has no PR number and falls
# back to `github.ref` — the SAME value on every dispatch run — so dispatch
# runs against the persistent `development` environment still serialize
# against each other, which matters MORE now: that is the only path that
# still runs the reset-seed job (M4-21-06), and two concurrent resets would
# corrupt each other's fixtures.
concurrency:
  group: dev-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read   # await-ci reads the CI check-run status on this commit

env:
  # Stable Railway resource identifiers — see PREREQUISITES #6 above. NOT the
  # opaque generated domain strings (those are discovered fresh by
  # resolve-env below, never hardcoded — F7).
  RAILWAY_PROJECT_ID: 9ce6caf1-8c9b-4c77-b40d-3d6f1efa48a3
  RAILWAY_DEV_ENVIRONMENT_ID: 6c864094-6a06-452f-8495-be77d8a94fe7
  RAILWAY_SVC_GATEWAY_ID: 951fff95-e881-4838-878f-0626a4c44693
  RAILWAY_SVC_APP_ID: cb4a38ca-4440-4a0a-892e-c01d8013bb9a
  RAILWAY_SVC_LANDING_ID: 21e62d5d-82c9-48d8-8f6b-b2a53104c046
  RAILWAY_SVC_OPS_CONSOLE_ID: 00df2247-ee57-4722-a663-c7d3a29e2cdd
  # M4-21-10: the Postgres service id (recorded in docs/migrations.md's provisioning
  # Appendix), used to discover each run's superuser DSN fresh via GraphQL instead of the
  # deleted DATABASE_SUPERUSER_URL_DEV secret — same stable-resource-id pattern as the
  # four service ids above (never the per-environment DSN value itself, which is always
  # discovered, F7).
  RAILWAY_SVC_POSTGRES_ID: 98723af0-50ca-42a4-a56a-3e0438b9ce8a

jobs:
  # 0. CI gate: never deploy red code. On a PR, wait for the required `CI`
  #    workflow to go GREEN on THIS commit before any deploy job runs.
  #    workflow_dispatch bypasses this gate (manual force-deploy for live
  #    debugging); draft PRs skip it (and everything below). Every deploy job
  #    is transitively downstream of deploy-gateway, so gating deploy-gateway
  #    on this one job gates the whole pipeline. Runs in PARALLEL with
  #    resolve-env below (neither needs the other) to keep wall-clock time
  #    down — CI can take up to ~20m, environment resolution up to ~5m.
  await-ci:
    name: Await green CI (PR only; dispatch bypasses)
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for the CI check to succeed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Gating deploy on the 'CI' check for $SHA ..."
          for _ in $(seq 1 80); do   # ~20 min (80 × 15s)
            j=$(gh api "repos/$REPO/commits/$SHA/check-runs?check_name=CI&per_page=100" 2>/dev/null || echo '{}')
            status=$(echo "$j" | jq -r '[.check_runs[]?] | sort_by(.started_at // "") | last | .status // "none"')
            concl=$(echo "$j"  | jq -r '[.check_runs[]?] | sort_by(.started_at // "") | last | .conclusion // "none"')
            echo "  CI: status=$status conclusion=$concl"
            if [ "$concl" = "success" ]; then echo "CI is green — deploying."; exit 0; fi
            if [ "$status" = "completed" ] && [ "$concl" != "none" ] && [ "$concl" != "success" ]; then
              echo "::error::CI concluded '$concl' for $SHA — refusing to deploy red code."
              exit 1
            fi
            sleep 15
          done
          echo "::error::Timed out after ~20m waiting for the CI check on $SHA."
          exit 1

  # 0.5. Resolve the target Railway environment (M4-21-09). On a PR, poll for
  #      this PR's ephemeral environment and resolve its name via the pure
  #      `Match` function (M4-21-08, tools/prenv) — never guessed or
  #      constructed (F5). On workflow_dispatch, the target is always the
  #      persistent `development` environment (its id is a stable, hardcoded
  #      constant — PREREQUISITES #6). Either way, this job also asserts
  #      every non-Postgres service instance still has empty Watch Paths
  #      (PREREQUISITES #5) and discovers the 4 public URLs fresh (F7) — the
  #      hardcoded workflow-level `env:` URLs this superseded are GONE; every
  #      consumer below reads `needs.resolve-env.outputs.*` instead.
  resolve-env:
    name: Resolve Railway environment (+ assert Watch Paths + discover URLs)
    if: >-
      always() &&
      ( github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.draft == false )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      environment_id: ${{ steps.resolve.outputs.environment_id }}
      gateway_url: ${{ steps.urls.outputs.gateway_url }}
      app_url: ${{ steps.urls.outputs.app_url }}
      landing_url: ${{ steps.urls.outputs.landing_url }}
      ops_console_url: ${{ steps.urls.outputs.ops_console_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve environment name + id
        id: resolve
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          set -euo pipefail

          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — targeting the persistent development environment."
            echo "environment=development" >> "$GITHUB_OUTPUT"
            echo "environment_id=$RAILWAY_DEV_ENVIRONMENT_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${PR_TOKEN:-}" ]; then
            echo "::error::secrets.RAILWAY_API_TOKEN is not set. This is the account-scoped Railway token every PR-environment deploy authenticates with (M4-21-07/task-131, human-provisioned — a project token cannot reach an ephemeral PR environment, F6). Add it as a GitHub Actions secret named RAILWAY_API_TOKEN before this can succeed."
            exit 1
          fi

          query_body=$(jq -n --arg pid "$RAILWAY_PROJECT_ID" \
            '{query: "query($p:String!,$e:Boolean){environments(projectId:$p,isEphemeral:$e){edges{node{id name}}}}", variables: {p: $pid, e: true}}')

          echo "Polling Railway for PR #$PR_NUMBER's ephemeral environment (bounded ~300s) ..."
          resolved=""
          resolved_id=""
          last_names=""
          for i in $(seq 1 30); do
            if ! resp=$(curl -fsS --connect-timeout 5 --max-time 15 \
                  --request POST \
                  --url https://backboard.railway.com/graphql/v2 \
                  --header "Authorization: Bearer $PR_TOKEN" \
                  --header "Content-Type: application/json" \
                  --data "$query_body"); then
              echo "  (attempt $i) Railway GraphQL request failed transiently, retrying ..."
              sleep 10
              continue
            fi

            if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::Railway GraphQL error while listing ephemeral environments: $(echo "$resp" | jq -c '.errors')"
              exit 1
            fi

            names=$(echo "$resp" | jq -r '.data.environments.edges[]?.node.name')
            last_names="$names"
            if [ -z "$names" ]; then
              echo "  (attempt $i) no ephemeral environments visible yet, retrying ..."
              sleep 10
              continue
            fi

            names_arr=()
            while IFS= read -r line; do
              [ -n "$line" ] && names_arr+=("$line")
            done <<< "$names"
            if match_out=$(go run ./tools/prenv "$PR_NUMBER" "${names_arr[@]}" 2>&1); then
              resolved="$match_out"
              resolved_id=$(echo "$resp" | jq -r --arg n "$resolved" '.data.environments.edges[] | select(.node.name == $n) | .node.id')
              break
            fi

            if echo "$match_out" | grep -qi "ambiguous"; then
              echo "::error::tools/prenv reported an AMBIGUOUS match — refusing to guess which environment is PR #$PR_NUMBER's: $match_out"
              exit 1
            fi

            echo "  (attempt $i) no match yet ($match_out), retrying ..."
            sleep 10
          done

          if [ -z "$resolved" ]; then
            echo "::error::No Railway ephemeral environment resolved for PR #$PR_NUMBER within ~300s. Candidate names last seen: ${last_names:-<none>}. Confirm Railway PR Environments + Bot PR Environments are enabled (M4-21-07/task-131)."
            exit 1
          fi

          echo "Resolved environment: $resolved ($resolved_id)"
          echo "environment=$resolved" >> "$GITHUB_OUTPUT"
          echo "environment_id=$resolved_id" >> "$GITHUB_OUTPUT"

      - name: Assert Watch Paths are empty on all 11 non-Postgres services (M3-16 invariant)
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          RAILWAY_QUERY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_QUERY_TOKEN:-}" ]; then
            echo "::error::No Railway token available for this event type (see the resolve step above for which secret is required)."
            exit 1
          fi
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            auth_header="Project-Access-Token: $RAILWAY_QUERY_TOKEN"
          else
            auth_header="Authorization: Bearer $RAILWAY_QUERY_TOKEN"
          fi

          query_body=$(jq -n --arg e "$ENV_ID" \
            '{query: "query($e:String!){environment(id:$e){serviceInstances{edges{node{serviceName watchPatterns}}}}}", variables: {e: $e}}')

          if ! resp=$(curl -fsS --connect-timeout 5 --max-time 15 \
                --request POST \
                --url https://backboard.railway.com/graphql/v2 \
                --header "$auth_header" \
                --header "Content-Type: application/json" \
                --data "$query_body"); then
            echo "::error::Railway GraphQL request failed while reading serviceInstances for environment $ENV_ID"
            exit 1
          fi
          if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::Railway GraphQL error while reading serviceInstances: $(echo "$resp" | jq -c '.errors')"
            exit 1
          fi

          expected_json='["gateway","tenancy","portfolio","invoice","validation","submission","dashboard","notifications","landing","app","ops-console"]'

          missing=$(echo "$resp" | jq -r --argjson names "$expected_json" '
            ([.data.environment.serviceInstances.edges[]?.node.serviceName]) as $present
            | ($names - $present)[]?
          ')
          if [ -n "$missing" ]; then
            echo "::error::Expected service(s) not found in this environment's serviceInstances (renamed or missing?): $missing"
            exit 1
          fi

          offenders=$(echo "$resp" | jq -r --argjson names "$expected_json" '
            .data.environment.serviceInstances.edges[]?.node
            | select(.serviceName as $n | $names | index($n) != null)
            | select((.watchPatterns // []) | length > 0)
            | "\(.serviceName): \(.watchPatterns | join(", "))"
          ')
          if [ -n "$offenders" ]; then
            echo "::error::Non-empty Watch Paths found (M3-16 invariant violated) — railway up would SILENTLY SKIP these services on this run, reproducing the cold-fleet failure invisibly:"
            echo "$offenders"
            exit 1
          fi
          echo "All 11 non-Postgres service instances report empty Watch Paths."

      - name: Discover the 4 public URLs (never construct — F7)
        id: urls
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          RAILWAY_QUERY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
        run: |
          set -euo pipefail

          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            auth_header="Project-Access-Token: $RAILWAY_QUERY_TOKEN"
          else
            auth_header="Authorization: Bearer $RAILWAY_QUERY_TOKEN"
          fi

          fetch_domain() {
            svc_id="$1"
            svc_label="$2"
            body=$(jq -n --arg p "$RAILWAY_PROJECT_ID" --arg e "$ENV_ID" --arg s "$svc_id" \
              '{query: "query($p:String!,$e:String!,$s:String!){domains(projectId:$p,environmentId:$e,serviceId:$s){serviceDomains{domain}}}", variables: {p: $p, e: $e, s: $s}}')

            if ! r=$(curl -fsS --connect-timeout 5 --max-time 15 \
                  --request POST \
                  --url https://backboard.railway.com/graphql/v2 \
                  --header "$auth_header" \
                  --header "Content-Type: application/json" \
                  --data "$body"); then
              echo "::error::Railway GraphQL request failed discovering the $svc_label domain" >&2
              return 1
            fi
            if echo "$r" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::Railway GraphQL error discovering the $svc_label domain: $(echo "$r" | jq -c '.errors')" >&2
              return 1
            fi

            d=$(echo "$r" | jq -r '.data.domains.serviceDomains[0].domain // empty')
            if [ -z "$d" ]; then
              echo "::error::No Railway-provided domain found for $svc_label (service $svc_id) in environment $ENV_ID — it must have a domain (docs/add-a-service.md step 6)." >&2
              return 1
            fi
            echo "https://$d"
          }

          gateway_url=$(fetch_domain "$RAILWAY_SVC_GATEWAY_ID" gateway) || exit 1
          app_url=$(fetch_domain "$RAILWAY_SVC_APP_ID" app) || exit 1
          landing_url=$(fetch_domain "$RAILWAY_SVC_LANDING_ID" landing) || exit 1
          ops_console_url=$(fetch_domain "$RAILWAY_SVC_OPS_CONSOLE_ID" ops-console) || exit 1

          {
            echo "gateway_url=$gateway_url"
            echo "app_url=$app_url"
            echo "landing_url=$landing_url"
            echo "ops_console_url=$ops_console_url"
          } >> "$GITHUB_OUTPUT"

          echo "gateway=$gateway_url app=$app_url landing=$landing_url ops-console=$ops_console_url"

  # 1. Deploy the gateway FIRST — it is the fleet's single migrator (docs/
  #    migrations.md §2). `--ci` streams build logs then exits after the
  #    BUILD (health is gated separately below). Skipped for draft PRs. The
  #    two `railway variables --set` calls this job used to make at deploy
  #    time (GATEWAY_MOCK_ISSUER, CORS_ALLOWED_ORIGINS) are GONE — both are
  #    now durable Railway reference variables (M4-21-05, task-129), which
  #    Railway forks into every PR environment along with the rest of
  #    `development`'s variable topology.
  deploy-gateway:
    name: Deploy gateway → ${{ needs.resolve-env.outputs.environment }}
    needs: [await-ci, resolve-env]
    if: >-
      always() &&
      needs.resolve-env.result == 'success' &&
      ( github.event_name == 'workflow_dispatch' ||
        ( github.event.pull_request.draft == false && needs.await-ci.result == 'success' ) )
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    steps:
      - uses: actions/checkout@v4
      - name: railway up gateway
        env:
          RAILWAY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.resolve-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh gateway
        timeout-minutes: 15

  # 2. Schema-before-fleet barrier: the gateway migrates at boot and
  #    log.Fatals on a bad migration, so a green /healthz proves the schema is
  #    fully migrated — this is what the context services, the SPAs, and the
  #    reset/seed all wait behind.
  health-gate:
    name: Gate on gateway /healthz (schema migrated)
    needs: [deploy-gateway, resolve-env]
    # always() breaks the transitive skip-cascade so a workflow_dispatch run (where
    # await-ci is skipped) still verifies the fleet — without it, this job and every
    # job downstream inherit await-ci's skip even though deploy-gateway ran via its
    # own always(). Gate on the real dependency result, not the cascade.
    if: always() && needs.deploy-gateway.result == 'success'
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.resolve-env.outputs.gateway_url }}
    steps:
      - name: Wait for gateway /healthz 200
        run: |
          echo "Waiting for $GATEWAY_URL/healthz ..."
          ok=0
          # 900s (180 x 5s): EVERY environment is now a cold build of all 11
          # services (M4-21 per-PR environments, Decision
          # [gate-windows-provisional]) — cold is the norm now, not the
          # exception the old 360s window assumed. Widen further if the
          # first green cold run needs it.
          for _ in $(seq 1 180); do
            code=$(curl -fsS --connect-timeout 5 --max-time 10 -o /dev/null -w '%{http_code}' "$GATEWAY_URL/healthz" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then echo "  gateway healthy (schema migrated)"; ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::$GATEWAY_URL/healthz did not return 200 within 900s (migration failed?)"
            exit 1
          fi

  # 3. Deploy the seven context services, only after the gateway is healthy.
  #    They boot against the already-migrated schema and never run
  #    migrations. Skipped for draft PRs.
  deploy-context:
    name: Deploy ${{ matrix.service }} → ${{ needs.resolve-env.outputs.environment }}
    needs: [health-gate, resolve-env]
    if: always() && needs.health-gate.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [tenancy, portfolio, invoice, validation, submission, dashboard, notifications]
    steps:
      - uses: actions/checkout@v4
      - name: railway up ${{ matrix.service }}
        env:
          RAILWAY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.resolve-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15

  # 4. Deploy the three SPAs in parallel, only after the gateway is healthy.
  #    The app SPA's VITE_GATEWAY_URL is now a durable Railway reference
  #    variable (M4-21-05, task-129: app.VITE_GATEWAY_URL =
  #    https://${{gateway.RAILWAY_PUBLIC_DOMAIN}}), forked per-environment
  #    along with the rest of the variable topology — the per-run `railway
  #    variables --set` this job used to do is GONE.
  deploy-spas:
    name: Deploy ${{ matrix.service }} → ${{ needs.resolve-env.outputs.environment }}
    needs: [health-gate, resolve-env]
    if: always() && needs.health-gate.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [landing, app, ops-console]
    steps:
      - uses: actions/checkout@v4
      - name: railway up ${{ matrix.service }}
        env:
          RAILWAY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.resolve-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15

  # 5. Reset + seed the dev DB (data-only) as the Postgres SUPERUSER, after the
  #    schema is migrated (health-gate) and before any assertion — setup owns
  #    correctness, so every run starts from the known fixture set regardless
  #    of prior state.
  #
  #    CONDITIONAL ON workflow_dispatch ONLY (M4-21-06, re-scoped per QA F2):
  #    a PR environment's database is born EMPTY (F8) and the gateway seeds
  #    it at boot (M4-21-04) — running this here too would be redundant, not
  #    wrong, but `development` is DIFFERENT: it is PERSISTENT (Decision
  #    [dev-env-status]) and `db/seed.dev.sql` is upsert-only (`ON CONFLICT
  #    DO UPDATE`/`DO NOTHING` — it only ever ADDS rows, never clears them),
  #    so without this step `development` would accumulate rows without bound
  #    across every dispatch-triggered E2E run: e2e/api/import.spec.ts:110,123
  #    imports 500 invoices / 1500 rows per run; e2e/demo/day30.spec.ts:149-168
  #    onboards a permanent business_entities row per run. `db/reset.dev.sql`
  #    (the repo's only TRUNCATE, line 18: `TRUNCATE tenants CASCADE`) is kept
  #    for exactly this reason — do NOT delete it. (`make demo-reset` /
  #    db/demo-reset.sql is a separate, MANUAL, single-tenant tool — not a
  #    substitute, deliberately not reused here.)
  reset-seed:
    name: Reset + seed dev DB (data-only, superuser; development only)
    needs: health-gate
    if: always() && needs.health-gate.result == 'success' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Discover the development Postgres superuser DSN (M4-21-10; never a job output — masked here)
        env:
          RAILWAY_QUERY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
        run: |
          set -euo pipefail
          query_body=$(jq -n --arg p "$RAILWAY_PROJECT_ID" --arg e "$RAILWAY_DEV_ENVIRONMENT_ID" --arg s "$RAILWAY_SVC_POSTGRES_ID" \
            '{query: "query($p:String!,$e:String!,$s:String!){variables(projectId:$p,environmentId:$e,serviceId:$s)}", variables: {p: $p, e: $e, s: $s}}')
          if ! resp=$(curl -fsS --connect-timeout 5 --max-time 15 \
                --request POST \
                --url https://backboard.railway.com/graphql/v2 \
                --header "Project-Access-Token: $RAILWAY_QUERY_TOKEN" \
                --header "Content-Type: application/json" \
                --data "$query_body"); then
            echo "::error::Railway GraphQL request failed discovering the development Postgres superuser DSN"
            exit 1
          fi
          if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::Railway GraphQL error discovering the Postgres superuser DSN: $(echo "$resp" | jq -c '.errors')"
            exit 1
          fi
          dsn=$(echo "$resp" | jq -r '.data.variables.DATABASE_PUBLIC_URL // empty')
          if [ -z "$dsn" ]; then
            echo "::error::DATABASE_PUBLIC_URL not found on the Postgres service (id $RAILWAY_SVC_POSTGRES_ID) in the development environment"
            exit 1
          fi
          echo "::add-mask::$dsn"
          echo "DSN=$dsn" >> "$GITHUB_ENV"
      - name: TRUNCATE + re-seed tenant fixtures
        run: |
          if [ -z "${DSN:-}" ]; then
            echo "::error::DSN was not populated by the discovery step above"
            exit 1
          fi
          echo "Resetting dev tenant fixtures (data-only, schema untouched) ..."
          psql "$DSN" -v ON_ERROR_STOP=1 -f db/reset.dev.sql
          psql "$DSN" -v ON_ERROR_STOP=1 -f db/seed.dev.sql
          echo "Seeded tenants:"
          psql "$DSN" -v ON_ERROR_STOP=1 -c "select id, name from tenants order by name;"

  # 6. Post-deploy verification (a): the fleet /healthz gate. Poll the
  #    gateway's fleet-health roll-up until all 8 backends are green (they may
  #    cold-start after `up`); fail the run naming the culprit if any stays
  #    down.
  fleet-gate:
    name: Fleet /healthz gate (all 8 backends green)
    needs: [deploy-context, resolve-env]
    if: always() && needs.deploy-context.result == 'success'
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.resolve-env.outputs.gateway_url }}
    steps:
      - name: Poll gateway /healthz/fleet until all up
        run: |
          echo "Polling $GATEWAY_URL/healthz/fleet ..."
          code=000
          # 600s (120 x 5s): every environment is now a cold build (M4-21 per-PR
          # environments, Decision [gate-windows-provisional]) — widened from 200s.
          for _ in $(seq 1 120); do
            code=$(curl -sS --connect-timeout 5 --max-time 10 -o /tmp/fleet.json -w '%{http_code}' "$GATEWAY_URL/healthz/fleet" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then break; fi
            sleep 5
          done
          echo "--- fleet health (HTTP $code) ---"
          jq . /tmp/fleet.json 2>/dev/null || cat /tmp/fleet.json || true
          if [ "$code" != "200" ]; then
            echo "::error::fleet not all-green (HTTP $code). Down services:"
            jq -r '.services[] | select(.status != "up") | "  DOWN: \(.name) — \(.error // "unhealthy")"' /tmp/fleet.json 2>/dev/null || true
            exit 1
          fi
          echo "All 8 backends green."

  # 7. Post-deploy verification (b): smoke (landing + ops-console render), api
  #    (typed contract suite against the gateway), topology (browser login
  #    + cross-tenant isolation), and demo (Day-30 wedge journey) via Playwright,
  #    once the fleet is green, the SPAs are deployed, and the DB is seeded
  #    (workflow_dispatch) or self-seeded at gateway boot (PR environments —
  #    reset-seed is SKIPPED there, not waited on: M4-21-06).
  e2e:
    name: E2E (smoke + api + topology + demo)
    needs: [fleet-gate, deploy-spas, reset-seed, resolve-env]
    if: >-
      always() &&
      needs.fleet-gate.result == 'success' &&
      needs.deploy-spas.result == 'success' &&
      ( needs.reset-seed.result == 'success' || needs.reset-seed.result == 'skipped' )
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.resolve-env.outputs.gateway_url }}
      APP_URL: ${{ needs.resolve-env.outputs.app_url }}
      LANDING_URL: ${{ needs.resolve-env.outputs.landing_url }}
      OPS_CONSOLE_URL: ${{ needs.resolve-env.outputs.ops_console_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Wait for SPA /health
        run: |
          for url in "$LANDING_URL" "$APP_URL" "$OPS_CONSOLE_URL"; do
            echo "Waiting for $url/health ..."
            ok=0
            # 600s (120 x 5s): every environment is now a cold build (M4-21
            # per-PR environments, Decision [gate-windows-provisional]) —
            # widened from 200s.
            for _ in $(seq 1 120); do
              code=$(curl -fsS -o /dev/null -w '%{http_code}' "$url/health" 2>/dev/null || echo 000)
              if [ "$code" = "200" ]; then echo "  healthy"; ok=1; break; fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "::error::$url did not serve /health 200 within 600s"; exit 1
            fi
          done
      - name: Install Chromium
        run: pnpm --filter @invoice-os/e2e exec playwright install --with-deps chromium
      - name: Discover the E2E superuser DSN (M4-21-10; never a job output — masked here)
        # Replaces the deleted DATABASE_SUPERUSER_URL_DEV secret: discovers THIS run's own
        # environment's Postgres DATABASE_PUBLIC_URL fresh via Railway GraphQL (never the
        # shared development database on a PR run — that was the M4-21-06 gap this closes)
        # and exports it for the two steps below via $GITHUB_ENV (job-local, not a job
        # output). Same conditional auth-header pattern as the resolve-env job's own
        # Railway GraphQL calls.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          RAILWAY_QUERY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ needs.resolve-env.outputs.environment_id }}
        run: |
          set -euo pipefail
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            auth_header="Project-Access-Token: $RAILWAY_QUERY_TOKEN"
          else
            auth_header="Authorization: Bearer $RAILWAY_QUERY_TOKEN"
          fi
          query_body=$(jq -n --arg p "$RAILWAY_PROJECT_ID" --arg e "$ENV_ID" --arg s "$RAILWAY_SVC_POSTGRES_ID" \
            '{query: "query($p:String!,$e:String!,$s:String!){variables(projectId:$p,environmentId:$e,serviceId:$s)}", variables: {p: $p, e: $e, s: $s}}')
          if ! resp=$(curl -fsS --connect-timeout 5 --max-time 15 \
                --request POST \
                --url https://backboard.railway.com/graphql/v2 \
                --header "$auth_header" \
                --header "Content-Type: application/json" \
                --data "$query_body"); then
            echo "::error::Railway GraphQL request failed discovering the Postgres superuser DSN for environment $ENV_ID"
            exit 1
          fi
          if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::Railway GraphQL error discovering the Postgres superuser DSN: $(echo "$resp" | jq -c '.errors')"
            exit 1
          fi
          dsn=$(echo "$resp" | jq -r '.data.variables.DATABASE_PUBLIC_URL // empty')
          if [ -z "$dsn" ]; then
            echo "::error::DATABASE_PUBLIC_URL not found on the Postgres service (id $RAILWAY_SVC_POSTGRES_ID) in environment $ENV_ID"
            exit 1
          fi
          echo "::add-mask::$dsn"
          echo "DATABASE_SUPERUSER_URL_DEV=$dsn" >> "$GITHUB_ENV"
      - name: Smoke (landing + ops-console render)
        run: pnpm --filter @invoice-os/e2e test:smoke
      - name: API E2E (typed contract suite)
        # Runs BEFORE topology: its beforeAll self-heal + afterAll rule-restore
        # must complete before topology's rule-dependent assertions run (D4).
        # Shares the global `rules` fixture with topology, so ordering here is
        # load-bearing, not cosmetic. GATEWAY_URL comes from this job's `env:`
        # (needs.resolve-env.outputs.gateway_url — the seam reads it
        # directly) — no chromium needed (A6: the api config declares no
        # browser project). Needs the superuser DSN (DATABASE_SUPERUSER_URL_DEV,
        # exported by the discovery step above) for the same reason the demo
        # step below does — assertions with no read API: PERF-05's Day-60
        # stamp gate reads invoice_status_history, and PERF-03/04 compare the
        # stamped rule_set_version_id against v2's uuid queried live
        # (api/db.ts). Without it those three degrade to a skip, which is how
        # M4-04-08 shipped an invisible green — api/db.ts's requireDbInCI
        # now fails the run instead of skipping if the DSN ever goes missing.
        run: pnpm --filter @invoice-os/e2e test:api
      - name: Topology (app verified-login + cross-tenant isolation)
        # GATEWAY_URL + APP_URL + LANDING_URL + OPS_CONSOLE_URL come from this
        # job's `env:` (needs.resolve-env.outputs.* — topology/targets.ts
        # reads them).
        run: pnpm --filter @invoice-os/e2e test:topology
      - name: Demo (Day-30 wedge journey)
        # Runs LAST (after topology): the demo kill-switches vat-standard-rate then
        # restores it, so no rule-dependent suite runs after it in the same run; the
        # api suite's beforeAll self-heal is the cross-run backstop (M3-11 D6). AC-7's
        # audit assertion needs the superuser DSN (DATABASE_SUPERUSER_URL_DEV, exported
        # by the discovery step above); GATEWAY_URL/APP_URL come from this job's `env:`
        # (the seam reads them), and chromium is already installed.
        run: pnpm --filter @invoice-os/e2e test:demo
      - name: Upload smoke Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload API Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload topology Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: topology-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload demo Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: there is still NO scale-down job here for a PR run — a PR
  # environment's teardown is Railway's own automatic PR-Environment
  # deprovisioning (task-131 Part 4) once M4-21-07 is live. A
  # workflow_dispatch run against `development` still stays up.
  # dev-env-cleanup.yml (the old shared-env `railway down` sweep, whose
  # `dev-preview-shared` concurrency group no longer intersects this
  # workflow's per-PR groups above) is DELETED (M4-21-11) — see Decision
  # [cleanup-workflow-deleted]: tearing down `development` would contradict
  # Decision [dev-env-status], which keeps it persistent.
