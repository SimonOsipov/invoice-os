name: Dev Env (deploy full fleet + verify)

# Deploy the whole fleet to one Railway environment, then verify it.
# A ready PR → its own ephemeral env, which THIS workflow forks from
# `development` itself (M4-23-03) — not Railway's PR Environments feature, which
# is OFF and stays OFF. workflow_dispatch → `development` itself (deploy +
# health-gate + fleet-gate only — M4-22-07 dropped reset-seed and E2E here).
#
# Auth: PR runs use RAILWAY_API_TOKEN (account-scoped); workflow_dispatch uses
# RAILWAY_API_DEV_TOKEN (project token, `Project-Access-Token` header). An
# account token would cover both — collapsing them is an open cleanup.
# Account tokens carry no implicit scope, so every call names --project /
# --environment explicitly.
#
# Human-applied prerequisites (see docs/topology-e2e.md):
#  - Railway PR Environments are OFF and MUST STAY OFF (M4-23-02) — do NOT turn
#    them on. They never worked here (Railway is not subscribed to this repo's PR
#    events), and railway-invariants.yml now fails every PR if they are re-enabled
#    or if any deployment trigger appears. See docs/deploy-model.md.
#  - RAILWAY_API_TOKEN from Account Settings → Tokens, NOT Project Settings:
#    a project token is pinned to one env and cannot reach a PR env.
#  - Railway Watch Paths empty on all 11 non-Postgres services, or `railway up`
#    silently skips untouched services and a torn-down fleet never recovers.
#    prepare-env asserts this at runtime. Re-clear if a service is recreated.
#  - RAILWAY_* IDs in `env:` below are stable; update them if a resource is
#    ever deleted and recreated. Domain suffixes are opaque — always discovered,
#    never hardcoded.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'frontend/**'
      - 'packages/**'
      - 'e2e/**'
      - 'cmd/**'
      - 'internal/**'
      - 'migrations/**'
      - 'db/**'
      - 'tools/prenv/**'
      # M4-23-08: the create/reconcile/teardown/sweep logic lives here now, so a PR
      # touching it must fire the gate that validates it.
      - 'scripts/ci/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - 'Dockerfile.dockerignore'
      - 'Caddyfile'
      - 'package.json'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - '.github/workflows/dev-env.yml'
  workflow_dispatch:

# M4-21-09: each PR now deploys to its OWN ephemeral Railway environment, so
# two different PRs must run FULLY IN PARALLEL rather than queueing behind
# each other — the whole point of per-PR environments (Core AC 4/5). The
# group is keyed by PR number, so it is UNIQUE per PR: two different PRs'
# numbers never collide (their groups differ → both run at once), and a
# second push to the SAME PR queues behind (never cancels) an in-flight
# deploy of that SAME PR. A workflow_dispatch run has no PR number and falls
# back to `github.ref` — the SAME value on every dispatch run — so dispatch
# runs against the persistent `development` environment still serialize
# against each other: two concurrent dispatch runs would both `railway up`
# the same services into the same shared `development` environment, a
# deploy-corruption race that has nothing to do with DB seeding.
concurrency:
  group: dev-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  checks: read   # await-ci reads the CI check-run status on this commit

env:
  # Stable Railway resource identifiers — see PREREQUISITES #6 above. NOT the
  # opaque generated domain strings (those are discovered fresh by
  # prepare-env below, never hardcoded — F7).
  RAILWAY_PROJECT_ID: 9ce6caf1-8c9b-4c77-b40d-3d6f1efa48a3
  RAILWAY_DEV_ENVIRONMENT_ID: 6c864094-6a06-452f-8495-be77d8a94fe7
  RAILWAY_SVC_GATEWAY_ID: 951fff95-e881-4838-878f-0626a4c44693
  RAILWAY_SVC_APP_ID: cb4a38ca-4440-4a0a-892e-c01d8013bb9a
  RAILWAY_SVC_LANDING_ID: 21e62d5d-82c9-48d8-8f6b-b2a53104c046
  RAILWAY_SVC_OPS_CONSOLE_ID: 00df2247-ee57-4722-a663-c7d3a29e2cdd
  # M4-21-10: the Postgres service id (recorded in docs/migrations.md's provisioning
  # Appendix) — same stable-resource-id pattern as the four service ids above. No CI
  # job resolves a superuser DSN with it anymore (M4-22-08); scripts/ci/railway-env.sh
  # still uses it to create the Postgres volume and bring Postgres up in a fork
  # (ensure_postgres_volume, ensure_postgres_running). The Watch Paths assertion below
  # does NOT use it — it matches by a hardcoded 11-service name list instead.
  RAILWAY_SVC_POSTGRES_ID: 98723af0-50ca-42a4-a56a-3e0438b9ce8a

jobs:
  # 0. CI gate: never deploy red code. On a PR, wait for the required `CI`
  #    workflow to go GREEN on THIS commit before any deploy job runs.
  #    workflow_dispatch bypasses this gate (manual force-deploy for live
  #    debugging); draft PRs skip it (and everything below). Every deploy job
  #    is transitively downstream of deploy-gateway, so gating deploy-gateway
  #    on this one job gates the whole pipeline. Runs in PARALLEL with
  #    prepare-env below (neither needs the other) to keep wall-clock time
  #    down — CI can take up to ~20m, environment preparation far less now
  #    that it creates the environment instead of waiting for one to appear.
  await-ci:
    name: Await green CI (PR only; dispatch bypasses)
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Wait for the CI check to succeed on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          echo "Gating deploy on the 'CI' check for $SHA ..."
          for _ in $(seq 1 80); do   # ~20 min (80 × 15s)
            j=$(gh api "repos/$REPO/commits/$SHA/check-runs?check_name=CI&per_page=100" 2>/dev/null || echo '{}')
            status=$(echo "$j" | jq -r '[.check_runs[]?] | sort_by(.started_at // "") | last | .status // "none"')
            concl=$(echo "$j"  | jq -r '[.check_runs[]?] | sort_by(.started_at // "") | last | .conclusion // "none"')
            echo "  CI: status=$status conclusion=$concl"
            if [ "$concl" = "success" ]; then echo "CI is green — deploying."; exit 0; fi
            if [ "$status" = "completed" ] && [ "$concl" != "none" ] && [ "$concl" != "success" ]; then
              echo "::error::CI concluded '$concl' for $SHA — refusing to deploy red code."
              exit 1
            fi
            sleep 15
          done
          echo "::error::Timed out after ~20m waiting for the CI check on $SHA."
          exit 1

  # 0.5. Prepare the target Railway environment (M4-23-03). On a PR we now
  #      CREATE the environment ourselves rather than waiting for Railway to
  #      make one for us: `prenv name <pr>` derives `pr-<N>` (the single name
  #      constructor in this repo, M4-23-01), and `railway-env.sh
  #      ensure-environment` reuses it if it already exists or forks it from
  #      `development` otherwise. Idempotent, so a re-run of the same PR
  #      mutates nothing. There is no polling here and no dependence on
  #      Railway's PR Environments feature, which never worked in this project
  #      (M4-23-02) and must stay OFF. On workflow_dispatch, the target is
  #      always the persistent `development` environment (its id is a stable,
  #      hardcoded constant — PREREQUISITES #6) and the create path is
  #      structurally unreachable. Either way, this job also asserts every
  #      non-Postgres service instance still has empty Watch Paths
  #      (PREREQUISITES #5) and discovers the 4 public URLs fresh (F7) — the
  #      hardcoded workflow-level `env:` URLs this superseded are GONE; every
  #      consumer below reads `needs.prepare-env.outputs.*` instead.
  prepare-env:
    name: Prepare Railway environment (create-or-reuse + assert Watch Paths + discover URLs)
    if: >-
      always() &&
      ( github.event_name == 'workflow_dispatch' ||
        github.event.pull_request.draft == false )
    runs-on: ubuntu-latest
    # Raised 10 -> 20 by M4-23-04. The seam now creates the Postgres volume and
    # brings Postgres up in a fresh fork, waiting for it (<=420s). At 10
    # minutes a slow-but-CORRECT fork would die as a bare job-level timeout with
    # no annotation naming a cause — the exact failure mode the seam exists to
    # prevent. A job knob, not a restructure.
    timeout-minutes: 20
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      environment_id: ${{ steps.resolve.outputs.environment_id }}
      gateway_url: ${{ steps.urls.outputs.gateway_url }}
      app_url: ${{ steps.urls.outputs.app_url }}
      landing_url: ${{ steps.urls.outputs.landing_url }}
      ops_console_url: ${{ steps.urls.outputs.ops_console_url }}
    steps:
      - uses: actions/checkout@v4
      # Still required: `prenv name` is the ONLY environment-name constructor in
      # this repo (M4-23-01) and this step is a shell, so it must shell out to Go.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Resolve target environment (create-or-reuse)
        id: resolve
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: |
          set -euo pipefail

          # The workflow_dispatch short-circuit lives HERE, in the YAML, and not in
          # railway-env.sh, because it is a POLICY statement — `development` is
          # persistent and must never be created, forked over, or made ephemeral
          # ([development-not-ephemeral]) — and it belongs at the point a reader
          # looks for it. On this path the script is never invoked at all, so
          # environmentCreate is not merely guarded, it is unreachable.
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "workflow_dispatch — targeting the persistent development environment; environmentCreate is unreachable on this path."
            echo "environment=development" >> "$GITHUB_OUTPUT"
            echo "environment_id=$RAILWAY_DEV_ENVIRONMENT_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          name=$(go run ./tools/prenv name "$PR_NUMBER")
          echo "PR #$PR_NUMBER -> environment name '$name'"
          bash scripts/ci/railway-env.sh ensure-environment "$name"

      # --- STEP SEAM (M4-23-04) ---------------------------------------------
      # Fork reconciliation is inserted HERE, between `resolve` and `urls`, as a
      # pure insertion: `urls` DISCOVERS the 4 public domains and fails if any is
      # missing, so anything that has to make them exist must run before it and
      # after the environment exists. Do not merge these into either neighbour.
      #
      # Every step in the seam is skipped on workflow_dispatch. Load-bearing, not
      # cosmetic: on dispatch the target is `development` (nothing to reconcile —
      # it is not a fork) AND railway-env.sh authenticates with
      # `Authorization: Bearer`, which the dispatch path's Railway PROJECT token
      # cannot satisfy. Drop the guard and every dispatch run breaks.
      # ----------------------------------------------------------------------

      - name: Audit sealed variables in development (they do not fork)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
        run: bash scripts/ci/railway-env.sh audit-sealed-variables

      - name: Reconcile fork fidelity (domains, Postgres volume + bring-up, environment record)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
        run: bash scripts/ci/railway-env.sh reconcile-fork "$ENV_ID"

      - name: Assert Watch Paths are empty on all 11 non-Postgres services (M3-16 invariant)
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          RAILWAY_QUERY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
        run: |
          set -euo pipefail

          if [ -z "${RAILWAY_QUERY_TOKEN:-}" ]; then
            echo "::error::No Railway token available for this event type (see the resolve step above for which secret is required)."
            exit 1
          fi
          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            auth_header="Project-Access-Token: $RAILWAY_QUERY_TOKEN"
          else
            auth_header="Authorization: Bearer $RAILWAY_QUERY_TOKEN"
          fi

          query_body=$(jq -n --arg e "$ENV_ID" \
            '{query: "query($e:String!){environment(id:$e){serviceInstances{edges{node{serviceName watchPatterns}}}}}", variables: {e: $e}}')

          if ! resp=$(curl -fsS --connect-timeout 5 --max-time 15 \
                --request POST \
                --url https://backboard.railway.com/graphql/v2 \
                --header "$auth_header" \
                --header "Content-Type: application/json" \
                --data "$query_body"); then
            echo "::error::Railway GraphQL request failed while reading serviceInstances for environment $ENV_ID"
            exit 1
          fi
          if echo "$resp" | jq -e '.errors' >/dev/null 2>&1; then
            echo "::error::Railway GraphQL error while reading serviceInstances: $(echo "$resp" | jq -c '.errors')"
            exit 1
          fi

          expected_json='["gateway","tenancy","portfolio","invoice","validation","submission","dashboard","notifications","landing","app","ops-console"]'

          missing=$(echo "$resp" | jq -r --argjson names "$expected_json" '
            ([.data.environment.serviceInstances.edges[]?.node.serviceName]) as $present
            | ($names - $present)[]?
          ')
          if [ -n "$missing" ]; then
            echo "::error::Expected service(s) not found in this environment's serviceInstances (renamed or missing?): $missing"
            exit 1
          fi

          offenders=$(echo "$resp" | jq -r --argjson names "$expected_json" '
            .data.environment.serviceInstances.edges[]?.node
            | select(.serviceName as $n | $names | index($n) != null)
            | select((.watchPatterns // []) | length > 0)
            | "\(.serviceName): \(.watchPatterns | join(", "))"
          ')
          if [ -n "$offenders" ]; then
            echo "::error::Non-empty Watch Paths found (M3-16 invariant violated) — railway up would SILENTLY SKIP these services on this run, reproducing the cold-fleet failure invisibly:"
            echo "$offenders"
            exit 1
          fi
          echo "All 11 non-Postgres service instances report empty Watch Paths."

      - name: Discover the 4 public URLs (never construct — F7)
        id: urls
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          RAILWAY_QUERY_TOKEN: ${{ github.event_name == 'workflow_dispatch' && secrets.RAILWAY_API_DEV_TOKEN || secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
        run: |
          set -euo pipefail

          if [ "$GH_EVENT_NAME" = "workflow_dispatch" ]; then
            auth_header="Project-Access-Token: $RAILWAY_QUERY_TOKEN"
          else
            auth_header="Authorization: Bearer $RAILWAY_QUERY_TOKEN"
          fi

          fetch_domain() {
            svc_id="$1"
            svc_label="$2"
            body=$(jq -n --arg p "$RAILWAY_PROJECT_ID" --arg e "$ENV_ID" --arg s "$svc_id" \
              '{query: "query($p:String!,$e:String!,$s:String!){domains(projectId:$p,environmentId:$e,serviceId:$s){serviceDomains{domain}}}", variables: {p: $p, e: $e, s: $s}}')

            if ! r=$(curl -fsS --connect-timeout 5 --max-time 15 \
                  --request POST \
                  --url https://backboard.railway.com/graphql/v2 \
                  --header "$auth_header" \
                  --header "Content-Type: application/json" \
                  --data "$body"); then
              echo "::error::Railway GraphQL request failed discovering the $svc_label domain" >&2
              return 1
            fi
            if echo "$r" | jq -e '.errors' >/dev/null 2>&1; then
              echo "::error::Railway GraphQL error discovering the $svc_label domain: $(echo "$r" | jq -c '.errors')" >&2
              return 1
            fi

            d=$(echo "$r" | jq -r '.data.domains.serviceDomains[0].domain // empty')
            if [ -z "$d" ]; then
              echo "::error::No Railway-provided domain found for $svc_label (service $svc_id) in environment $ENV_ID — it must have a domain (docs/add-a-service.md step 6)." >&2
              return 1
            fi
            echo "https://$d"
          }

          gateway_url=$(fetch_domain "$RAILWAY_SVC_GATEWAY_ID" gateway) || exit 1
          app_url=$(fetch_domain "$RAILWAY_SVC_APP_ID" app) || exit 1
          landing_url=$(fetch_domain "$RAILWAY_SVC_LANDING_ID" landing) || exit 1
          ops_console_url=$(fetch_domain "$RAILWAY_SVC_OPS_CONSOLE_ID" ops-console) || exit 1

          {
            echo "gateway_url=$gateway_url"
            echo "app_url=$app_url"
            echo "landing_url=$landing_url"
            echo "ops_console_url=$ops_console_url"
          } >> "$GITHUB_OUTPUT"

          echo "gateway=$gateway_url app=$app_url landing=$landing_url ops-console=$ops_console_url"

      # Must run after `urls` (consumes the discovered values) and before any
      # service that bakes or reads them deploys. PR path only — the dispatch path
      # targets `development`, whose variables are the source of truth.
      - name: Point the fork's URL variables at the fork (never at development)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          ENV_ID: ${{ steps.resolve.outputs.environment_id }}
          GATEWAY_URL: ${{ steps.urls.outputs.gateway_url }}
          APP_URL: ${{ steps.urls.outputs.app_url }}
          LANDING_URL: ${{ steps.urls.outputs.landing_url }}
          OPS_CONSOLE_URL: ${{ steps.urls.outputs.ops_console_url }}
        run: |
          bash scripts/ci/railway-env.sh reconcile-urls \
            "$ENV_ID" "$GATEWAY_URL" "$APP_URL" "$LANDING_URL" "$OPS_CONSOLE_URL"

  # 1. Deploy the gateway FIRST — it is the fleet's single migrator (docs/
  #    migrations.md §2). `--ci` streams build logs then exits after the
  #    BUILD (health is gated separately below). Skipped for draft PRs. The
  #    GATEWAY_MOCK_ISSUER is an enable flag, not a URL, and forks fine.
  #    CORS_ALLOWED_ORIGINS is set per-environment by prepare-env's
  #    `reconcile-urls`: measured in pr-67, a fork inherits development's list.
  deploy-gateway:
    name: Deploy gateway → ${{ needs.prepare-env.outputs.environment }}
    needs: [await-ci, prepare-env]
    if: >-
      always() &&
      needs.prepare-env.result == 'success' &&
      ( github.event_name == 'workflow_dispatch' ||
        ( github.event.pull_request.draft == false && needs.await-ci.result == 'success' ) )
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    steps:
      - uses: actions/checkout@v4
      # PR path — account-scoped token. RAILWAY_TOKEN must be ABSENT, not empty:
      # measured 2026-07-19 in ghcr.io/railwayapp/cli:4.66.0, RAILWAY_TOKEN='' alongside a
      # valid RAILWAY_API_TOKEN still fails "Unauthorized", and a ternary cannot omit an
      # env key. Hence two steps rather than one.
      - name: railway up gateway (PR — account token)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh gateway
        timeout-minutes: 15
      # Dispatch path — project token scoped to `development`. Proven working by real
      # deploys (runs 29508626447, 29317896755 on main). Unchanged deliberately.
      - name: railway up gateway (dispatch — project token)
        if: github.event_name == 'workflow_dispatch'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh gateway
        timeout-minutes: 15

  # 2. Schema-before-fleet barrier: the gateway migrates at boot and
  #    log.Fatals on a bad migration, so a green /healthz proves the schema is
  #    fully migrated — this is what the context services, the SPAs, and the
  #    reset/seed all wait behind. Also now the SOLE Postgres liveness proof
  #    (M4-22-08 removed the TCP-readiness probe that used to cover this):
  #    Provision() runs bootstrap + migrate + seed to completion, fatal-on-error,
  #    before the gateway's listener opens (cmd/gateway/main.go ->
  #    internal/platform/server.go), so a 200 here is only reachable after
  #    Postgres has answered a real query — strictly stronger than a bare
  #    socket-readiness check.
  health-gate:
    name: Gate on gateway /healthz (schema migrated)
    needs: [deploy-gateway, prepare-env]
    # always() breaks the transitive skip-cascade so a workflow_dispatch run (where
    # await-ci is skipped) still verifies the fleet — without it, this job and every
    # job downstream inherit await-ci's skip even though deploy-gateway ran via its
    # own always(). Gate on the real dependency result, not the cascade.
    if: always() && needs.deploy-gateway.result == 'success'
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.prepare-env.outputs.gateway_url }}
    steps:
      - name: Wait for gateway /healthz 200
        run: |
          echo "Waiting for $GATEWAY_URL/healthz ..."
          ok=0
          # 900s (180 x 5s): EVERY environment is now a cold build of all 11
          # services (M4-23 per-PR environments, Decision
          # [gate-windows-provisional]) — cold is the norm now, not the
          # exception the old 360s window assumed. Widen further if the
          # first green cold run needs it.
          for _ in $(seq 1 180); do
            code=$(curl -fsS --connect-timeout 5 --max-time 10 -o /dev/null -w '%{http_code}' "$GATEWAY_URL/healthz" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then echo "  gateway healthy (schema migrated)"; ok=1; break; fi
            sleep 5
          done
          if [ "$ok" != "1" ]; then
            echo "::error::$GATEWAY_URL/healthz did not return 200 within 900s. This is now the ONLY Postgres liveness proof: most likely cause is Postgres reaching deployment SUCCESS with NO VOLUME attached — it keeps raw TCP open but never speaks the wire protocol, so the gateway's boot-time migration never completes. Verify reconcile-fork actually created the volume before assuming a generic gateway problem."
            exit 1
          fi

  # 3. Deploy the seven context services, only after the gateway is healthy.
  #    They boot against the already-migrated schema and never run
  #    migrations. Skipped for draft PRs.
  deploy-context:
    name: Deploy ${{ matrix.service }} → ${{ needs.prepare-env.outputs.environment }}
    needs: [health-gate, prepare-env]
    if: always() && needs.health-gate.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [tenancy, portfolio, invoice, validation, submission, dashboard, notifications]
    steps:
      - uses: actions/checkout@v4
      # Two mutually-exclusive steps, not one ternary — see deploy-gateway above for the
      # measurement: an account token in RAILWAY_TOKEN fails, and an empty RAILWAY_TOKEN
      # fails too, so the PR path needs the key genuinely absent.
      - name: railway up ${{ matrix.service }} (PR — account token)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15
      - name: railway up ${{ matrix.service }} (dispatch — project token)
        if: github.event_name == 'workflow_dispatch'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15

  # 4. Deploy the three SPAs in parallel, only after the gateway is healthy.
  #    Vite bakes VITE_* at BUILD time (frontend/*/Dockerfile), so these images
  #    ship whatever the service variables hold now — pointed at THIS environment
  #    by prepare-env's `reconcile-urls`.
  deploy-spas:
    name: Deploy ${{ matrix.service }} → ${{ needs.prepare-env.outputs.environment }}
    needs: [health-gate, prepare-env]
    if: always() && needs.health-gate.result == 'success' && (github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false)
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:4.66.0
    strategy:
      fail-fast: false
      matrix:
        service: [landing, app, ops-console]
    steps:
      - uses: actions/checkout@v4
      # Two mutually-exclusive steps, not one ternary — see deploy-gateway above for the
      # measurement: an account token in RAILWAY_TOKEN fails, and an empty RAILWAY_TOKEN
      # fails too, so the PR path needs the key genuinely absent.
      - name: railway up ${{ matrix.service }} (PR — account token)
        if: github.event_name != 'workflow_dispatch'
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15
      - name: railway up ${{ matrix.service }} (dispatch — project token)
        if: github.event_name == 'workflow_dispatch'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_DEV_TOKEN }}
          RAILWAY_ENVIRONMENT: ${{ needs.prepare-env.outputs.environment }}
        run: sh scripts/ci/railway-up-ci.sh ${{ matrix.service }}
        timeout-minutes: 15

  # 6. Post-deploy verification (a): the fleet /healthz gate. Poll the
  #    gateway's fleet-health roll-up until all 8 backends are green (they may
  #    cold-start after `up`); fail the run naming the culprit if any stays
  #    down.
  fleet-gate:
    name: Fleet /healthz gate (all 8 backends green)
    needs: [deploy-context, prepare-env]
    if: always() && needs.deploy-context.result == 'success'
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.prepare-env.outputs.gateway_url }}
    steps:
      - name: Poll gateway /healthz/fleet until all up
        run: |
          echo "Polling $GATEWAY_URL/healthz/fleet ..."
          code=000
          # 600s (120 x 5s): every environment is now a cold build (M4-23 per-PR
          # environments, Decision [gate-windows-provisional]) — widened from 200s.
          for _ in $(seq 1 120); do
            code=$(curl -sS --connect-timeout 5 --max-time 10 -o /tmp/fleet.json -w '%{http_code}' "$GATEWAY_URL/healthz/fleet" 2>/dev/null || echo 000)
            if [ "$code" = "200" ]; then break; fi
            sleep 5
          done
          echo "--- fleet health (HTTP $code) ---"
          jq . /tmp/fleet.json 2>/dev/null || cat /tmp/fleet.json || true
          if [ "$code" != "200" ]; then
            echo "::error::fleet not all-green (HTTP $code). Down services:"
            jq -r '.services[] | select(.status != "up") | "  DOWN: \(.name) — \(.error // "unhealthy")"' /tmp/fleet.json 2>/dev/null || true
            exit 1
          fi
          echo "All 8 backends green."

  # 7. Post-deploy verification (b): smoke (landing + ops-console render), api
  #    (typed contract suite against the gateway), topology (browser login
  #    + cross-tenant isolation), and demo (Day-30 wedge journey) via Playwright,
  #    once the fleet is green and the SPAs are deployed. PR environments only
  #    (M4-22-07: gated off workflow_dispatch, which no longer runs E2E) — the
  #    DB is self-seeded at gateway boot (M4-21-04), never separately reset.
  e2e:
    name: E2E (smoke + api + topology + demo)
    needs: [fleet-gate, deploy-spas, prepare-env]
    if: >-
      always() &&
      needs.fleet-gate.result == 'success' &&
      needs.deploy-spas.result == 'success' &&
      github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GATEWAY_URL: ${{ needs.prepare-env.outputs.gateway_url }}
      APP_URL: ${{ needs.prepare-env.outputs.app_url }}
      LANDING_URL: ${{ needs.prepare-env.outputs.landing_url }}
      OPS_CONSOLE_URL: ${{ needs.prepare-env.outputs.ops_console_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: Wait for SPA /health
        run: |
          for url in "$LANDING_URL" "$APP_URL" "$OPS_CONSOLE_URL"; do
            echo "Waiting for $url/health ..."
            ok=0
            # 600s (120 x 5s): every environment is now a cold build (M4-23
            # per-PR environments, Decision [gate-windows-provisional]) —
            # widened from 200s.
            for _ in $(seq 1 120); do
              code=$(curl -fsS -o /dev/null -w '%{http_code}' "$url/health" 2>/dev/null || echo 000)
              if [ "$code" = "200" ]; then echo "  healthy"; ok=1; break; fi
              sleep 5
            done
            if [ "$ok" != "1" ]; then
              echo "::error::$url did not serve /health 200 within 600s"; exit 1
            fi
          done
      - name: Install Chromium
        run: pnpm --filter @invoice-os/e2e exec playwright install --with-deps chromium
      - name: Smoke (landing + ops-console render)
        run: pnpm --filter @invoice-os/e2e test:smoke
      - name: API E2E (typed contract suite)
        # Runs BEFORE topology: its beforeAll self-heal + afterAll rule-restore
        # must complete before topology's rule-dependent assertions run (D4).
        # Shares the global `rules` fixture with topology, so ordering here is
        # load-bearing, not cosmetic. GATEWAY_URL comes from this job's `env:`
        # (needs.prepare-env.outputs.gateway_url — the seam reads it
        # directly) — no chromium needed (A6: the api config declares no
        # browser project). Does not touch the database directly (M4-22-05):
        # PERF-05's Day-60 stamp gate now reads invoice_status_history over
        # HTTP (GET .../history), and PERF-03/04 compare rule_set_version via
        # the validate/import response body, not a live DB query — api/db.ts
        # is deleted.
        run: pnpm --filter @invoice-os/e2e test:api
      - name: Topology (app verified-login + cross-tenant isolation)
        # GATEWAY_URL + APP_URL + LANDING_URL + OPS_CONSOLE_URL come from this
        # job's `env:` (needs.prepare-env.outputs.* — topology/targets.ts
        # reads them).
        run: pnpm --filter @invoice-os/e2e test:topology
      - name: Demo (Day-30 wedge journey)
        # Runs LAST (after topology): the demo kill-switches vat-standard-rate then
        # restores it, so no rule-dependent suite runs after it in the same run; the
        # api suite's beforeAll self-heal is the cross-run backstop (M3-11 D6). AC-7
        # (the audit_log read) is parked, not run at all (M4-22-06 [park-shape]) — this
        # step does not touch the database directly. GATEWAY_URL/APP_URL come from this
        # job's `env:` (the seam reads them), and chromium is already installed.
        run: pnpm --filter @invoice-os/e2e test:demo
      - name: Upload smoke Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload API Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-api
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload topology Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: topology-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7
      - name: Upload demo Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: demo-playwright-report
          path: e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 7

  # NOTE: there is still no scale-down job here — teardown is a separate
  # workflow, .github/workflows/dev-env-teardown.yml (M4-23-05), which deletes
  # the WHOLE ephemeral environment via environmentDelete on PR close. It
  # declares the SAME per-PR concurrency group as this workflow
  # (`dev-preview-<N>`, see :63-65) with `queue: max`, so a teardown queued
  # behind an in-flight deploy of the same PR waits for it rather than deleting
  # the environment mid-deploy ([teardown-shares-deploy-lock]).
  #
  # It replaces the deleted dev-env-cleanup.yml (M4-21-11), which scaled 11
  # services to zero inside one SHARED environment — the wrong unit now that
  # each PR owns an environment ([teardown-deletes-environment],
  # [cleanup-workflow-returns] reverses [cleanup-workflow-deleted]). Railway's
  # own PR-Environment deprovisioning is NOT the mechanism and never was: that
  # feature is OFF here and never created anything (M4-23-02).
  #
  # Teardown is the FAST path, not the guarantee: a `closed` event that does
  # not fire leaves an orphan, so dev-env-sweeper.yml (M4-23-07) reconciles
  # ephemeral environments against PR state daily and is the authority
  # ([teardown-best-effort-sweeper-authoritative]).
  #
  # A workflow_dispatch run against `development` still stays up: `development`
  # is persistent ([dev-env-status]) and no workflow ever deletes it.
