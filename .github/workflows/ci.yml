name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect which parts of the monorepo changed so SPA-only PRs skip Go and
  # Go-only PRs skip the frontend. A change to this workflow triggers both.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      frontend: ${{ steps.filter.outputs.frontend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - 'cmd/**'
              - 'internal/**'
              - 'migrations/**'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'
            migrations:
              - 'migrations/**'
              - 'db/**'
              - 'Makefile'
              - 'go.mod'
              - 'go.sum'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'
              - '.github/workflows/ci.yml'

  go:
    name: Go
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    # Postgres wired now, ready for M2 integration tests (go test picks up DATABASE_URL).
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/invoice_os_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # No dependencies / go.sum yet — nothing to cache. Enable in M2.
          cache: false
      - name: Build
        run: go build ./...
      # vet/test error on an empty module ("no packages"), so gate them on
      # there being at least one package. They run automatically from M2 on.
      - name: Vet
        run: |
          if [ -n "$(go list ./...)" ]; then
            go vet ./...
          else
            echo "No Go packages yet — skipping vet (wired for M2)."
          fi
      - name: Test
        run: |
          if [ -n "$(go list ./...)" ]; then
            go test ./...
          else
            echo "No Go packages yet — skipping test (wired for M2)."
          fi

  # The independent migration gate (M2-01, task-9.2): prove the goose harness end to
  # end against a FRESH, ephemeral Postgres — zero Railway dependency. Bootstrap the
  # two non-superuser roles as the superuser, apply every migration as the migrator,
  # assert nothing is left pending, then a reset→up round-trip to prove every
  # migration is reversible. The DB is empty each run (no reliance on prior state).
  # Modeled on learn-greek-easy's gating alembic-check; see docs/migrations.md §6.
  migrations:
    name: Migrations (fresh Postgres)
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    # Postgres MAJOR must match the Railway-provisioned major (both 18 today —
    # Railway's postgres-ssl template provisioned PG18) — bump together. See
    # docs/migrations.md §6 and add-a-service.md.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoice_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # bootstrap runs as the superuser; goose runs as the migrator. The app role
      # (DATABASE_URL) is deliberately never used here. Dev-safe passwords only —
      # this is an ephemeral throwaway DB.
      DATABASE_SUPERUSER_URL: postgres://postgres:postgres@localhost:5432/invoice_os?sslmode=disable
      DATABASE_MIGRATION_URL: postgres://invoice_migrator:migrator@localhost:5432/invoice_os?sslmode=disable
      MIGRATOR_PASSWORD: migrator
      APP_PASSWORD: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: Bootstrap non-superuser roles (as superuser; psql is preinstalled on the runner)
        run: make db-bootstrap
      - name: Apply all migrations from empty (as migrator)
        run: make migrate-up
      - name: Assert nothing pending after up
        # goose prints status to stderr — capture with 2>&1 or the grep never matches.
        run: |
          if make migrate-status 2>&1 | grep -qi 'pending'; then
            echo "::error::migrations still pending after 'up'"
            make migrate-status 2>&1 || true
            exit 1
          fi
          echo "No pending migrations after up."
      - name: Reversibility round-trip (reset all down -> up)
        # `reset` runs every Down; a broken/irreversible down exits non-zero here.
        run: |
          make migrate-reset
          make migrate-up
          if make migrate-status 2>&1 | grep -qi 'pending'; then
            echo "::error::migrations pending after reset->up round-trip"
            exit 1
          fi
          echo "Reset -> up round-trip clean; every migration is reversible."

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # action-setup reads the pinned pnpm version from package.json#packageManager.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Build
        run: pnpm -r build

  # Unconditional clean-clone guard (M1-09). The path-filtered go/frontend jobs
  # above only rebuild the half that changed, and the frontend job warms the pnpm
  # store cache — so cross-half rot, a cache-masked lockfile break, an accidentally
  # uncommitted build input (the M1-01 go.mod trap), or a root-file change that
  # matches neither filter can all slip past them. This job always runs, uses no
  # caches, and builds BOTH halves from a fresh checkout — permanently guarding the
  # module-path fix (M1-01) and the workspace collapse (M1-02/03).
  clean-clone:
    name: Clean-clone build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Go from scratch — no module/build cache.
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false
      - name: go build ./... (from scratch)
        run: go build ./...
      # All SPAs from scratch — cold pnpm install (deliberately no `cache: pnpm`)
      # so a stale cache can't mask a lockfile that no longer resolves.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: pnpm install (cold, frozen lockfile)
        run: pnpm install --frozen-lockfile
      - name: pnpm -r build (all three SPAs)
        run: pnpm -r build

  # Single always-running gate. Mark THIS check ("CI") required in branch
  # protection (M1-05): it passes when the triggered jobs pass or are skipped,
  # and fails only when a job that actually ran failed — so path-filtered
  # skips never leave a required check stuck pending.
  ci:
    name: CI
    needs: [changes, go, frontend, clean-clone, migrations]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all triggered jobs to pass
        run: |
          echo "changes:     ${{ needs.changes.result }}"
          echo "go:          ${{ needs.go.result }}"
          echo "migrations:  ${{ needs.migrations.result }}"
          echo "frontend:    ${{ needs.frontend.result }}"
          echo "clean-clone: ${{ needs.clean-clone.result }}"
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "::error::'changes' job did not succeed"; exit 1
          fi
          if [ "${{ needs.go.result }}" = "failure" ] || [ "${{ needs.go.result }}" = "cancelled" ]; then
            echo "::error::Go job failed"; exit 1
          fi
          if [ "${{ needs.migrations.result }}" = "failure" ] || [ "${{ needs.migrations.result }}" = "cancelled" ]; then
            echo "::error::Migrations job failed"; exit 1
          fi
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "::error::Frontend job failed"; exit 1
          fi
          # clean-clone is unconditional (no path filter) — it must actually pass,
          # never merely skip.
          if [ "${{ needs.clean-clone.result }}" != "success" ]; then
            echo "::error::Clean-clone build failed"; exit 1
          fi
          echo "All triggered CI jobs passed (skipped jobs are OK)."
